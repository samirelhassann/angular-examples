<div *ngIf="loadingHandler.isLoading$ | async; else content">
  <app-card
    icon="CreditCard"
    title="Credit Card">
    <div class="container">
      <div class="header">
        <div class="header__card-infos">
          <div class="header__card-info">
            <app-skeleton
              [height]="18"
              [width]="100" />
          </div>
          <div class="header__card-info">
            <app-skeleton
              [height]="18"
              [width]="140" />
          </div>
        </div>
      </div>

      <app-card-row-loading
        *ngFor="let _ of loadingQuantity; let even = even"
        [isBordered]="even" />
    </div>
  </app-card>
</div>

<ng-template #content>
  <app-card
    icon="CreditCard"
    title="Credit Card">
    <div class="container">
      <div class="header">
        <div class="header__card-infos">
          <div class="header__card-info">
            <lucide-icon
              name="User"
              class="header__card-info-icon"
              size="20" />
            <span>{{ clientName }}</span>
          </div>
          <div class="header__card-info">
            <lucide-icon
              name="CreditCard"
              class="header__card-info-icon"
              size="20" />
            <span>{{ cardNumber | cardNumberFormat }}</span>
          </div>
        </div>
      </div>

      <app-card-row
        *ngFor="let row of infos; let i = index"
        [label]="row.label"
        [value]="row.value"
        [isBordered]="i % 2 === 0" />
    </div>
  </app-card>
</ng-template>
